name: LLM Production MLOps Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'data/**'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  build-validate-train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Force-setting it to python 3.11 right here
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Modified this step slightly to force Git to see a text change
      - name: Install System and Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Step 1 - Merge Raw Datasets
        run: python scripts/merge_data.py

      - name: Step 2 - Gatekeeper Validation
        run: python scripts/validate_data.py

      - name: Step 3 - Train Production Model
        run: python scripts/train_model.py

      # Fixed path property added
      - name: Save Production Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: live-routing-model
          path: models/