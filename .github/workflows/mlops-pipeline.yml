name: LLM Production MLOps Pipeline

# 1. THE TRIGGER: When does this run?
on:
  push:
    branches:
      - main
      - master
    paths:
      - 'data/**'      # Wake up if new CSV data is uploaded
      - 'scripts/**'   # Wake up if you update the python code

jobs:
  build-validate-train:
    # 2. THE ENVIRONMENT: What kind of computer do we want?
    runs-on: ubuntu-latest

    steps:
      # 3. GET THE CODE: Pulls your files onto the cloud server
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 4. SET UP PYTHON: Installs Python 3.10 and caches packages for speed
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. EXECUTE YOUR PIPELINE (Exactly as you did locally!)
      - name: Step 1 - Merge Raw Datasets
        run: python scripts/merge_data.py

      - name: Step 2 - Gatekeeper Validation
        run: python scripts/validate_data.py

      - name: Step 3 - Train Production Model
        run: python scripts/train_model.py

      # 6. SAVE THE RESULTS: Uploads the .pkl file so you can download it
      - name: Save Production Model Artifact
        uses: actions/upload-artifact@v4
        with:
          name: live-routing-model
          path: models/